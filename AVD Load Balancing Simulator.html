<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Alexandru Bratosin">
    <title>AVD Load Balancer Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .range-slider {
            width: 100%;
            height: 0.5rem;
            background-color: #e2e8f0;
            border-radius: 9999px;
            appearance: none;
            outline: none;
        }
        .range-slider::-webkit-slider-thumb {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            background-color: #4f46e5;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.15s ease-in-out;
        }
        .range-slider::-webkit-slider-thumb:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-900">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-100 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 leading-tight">Azure Virtual Desktop Simulator</h1>
                    <p class="text-xs text-slate-500 font-medium tracking-wide">by Alexandru Bratosin</p>
                </div>
            </div>
            <div class="text-xs bg-slate-100 px-3 py-1.5 rounded-full font-semibold text-slate-600 border border-slate-200">
                Interactive Architecture Model
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Sidebar Controls -->
            <div class="col-span-1 lg:col-span-4 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col gap-6">
                <div>
                    <h2 class="text-lg font-bold mb-1">Configuration Panel</h2>
                    <p class="text-xs text-slate-500">Adjust the AVD host pool parameters.</p>
                </div>

                <!-- Algorithm Selection -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-700">Load Balancing Algorithm</label>
                    <select id="algo-select" class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2.5 outline-none transition-colors">
                        <option value="breadth">Breadth-first (Performance)</option>
                        <option value="depth">Depth-first (Cost Optimization)</option>
                    </select>
                    <p id="algo-desc" class="text-[11px] text-slate-500 leading-tight mt-1"></p>
                </div>

                <hr class="border-slate-100">

                <!-- Users Slider -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="block text-sm font-medium text-slate-700">Incoming Users</label>
                        <span id="users-val" class="px-2 py-1 bg-indigo-50 text-indigo-700 rounded text-xs font-bold border border-indigo-100">5</span>
                    </div>
                    <input type="range" id="users-slider" min="0" max="32" value="5" class="range-slider">
                </div>

                <!-- Session Hosts Slider -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="block text-sm font-medium text-slate-700">Session Hosts Count</label>
                        <span id="hosts-val" class="px-2 py-1 bg-slate-100 text-slate-800 rounded text-xs font-bold border border-slate-200">4</span>
                    </div>
                    <input type="range" id="hosts-slider" min="2" max="8" value="4" class="range-slider">
                </div>

                <!-- Max Sessions Slider -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="block text-sm font-medium text-slate-700">Max Sessions per Host</label>
                        <span id="max-val" class="px-2 py-1 bg-slate-100 text-slate-800 rounded text-xs font-bold border border-slate-200">4</span>
                    </div>
                    <input type="range" id="max-slider" min="2" max="6" value="4" class="range-slider">
                </div>
            </div>

            <!-- Main Visualization Area -->
            <div class="col-span-1 lg:col-span-8 flex flex-col">
                <!-- Summary Metrics -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 flex flex-col justify-center shadow-sm">
                        <div class="text-xs text-indigo-600 font-bold uppercase tracking-wider mb-1">Active VMs</div>
                        <div id="active-count" class="text-3xl font-black text-indigo-900">0</div>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100 flex flex-col justify-center shadow-sm">
                        <div class="text-xs text-emerald-600 font-bold uppercase tracking-wider mb-1">Primary Benefit</div>
                        <div id="benefit-text" class="text-lg font-bold text-emerald-900 leading-tight">Performance</div>
                    </div>
                    <!-- Cost Cards -->
                    <div class="bg-rose-50 p-4 rounded-xl border border-rose-100 flex flex-col justify-center shadow-sm">
                        <div class="text-xs text-rose-600 font-bold uppercase tracking-wider mb-1">Est. Monthly Cost</div>
                        <div id="cost-val" class="text-2xl font-black text-rose-900">$0</div>
                        <div class="text-[9px] text-rose-500 mt-1 uppercase font-semibold tracking-wide">Active VMs ($146/mo)</div>
                    </div>
                    <div class="bg-teal-50 p-4 rounded-xl border border-teal-100 flex flex-col justify-center shadow-sm">
                        <div class="text-xs text-teal-600 font-bold uppercase tracking-wider mb-1">Cost Savings</div>
                        <div id="savings-val" class="text-2xl font-black text-teal-900">$0</div>
                        <div class="text-[9px] text-teal-500 mt-1 uppercase font-semibold tracking-wide">Deallocated VMs</div>
                    </div>
                </div>

                <!-- VM Grid Visualization -->
                <div class="flex-1 bg-white rounded-2xl border border-slate-200 p-6 overflow-y-auto shadow-sm min-h-[400px]">
                    <div id="vm-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
                        <!-- VMs injected here by JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // DOM Elements setup
        const els = {
            algo: document.getElementById('algo-select'),
            algoDesc: document.getElementById('algo-desc'),
            users: document.getElementById('users-slider'),
            usersVal: document.getElementById('users-val'),
            max: document.getElementById('max-slider'),
            maxVal: document.getElementById('max-val'),
            hosts: document.getElementById('hosts-slider'),
            hostsVal: document.getElementById('hosts-val'),
            vmGrid: document.getElementById('vm-grid'),
            activeCount: document.getElementById('active-count'),
            benefitText: document.getElementById('benefit-text'),
            costVal: document.getElementById('cost-val'),
            savingsVal: document.getElementById('savings-val')
        };

        // Constants
        const COST_PER_VM_MONTH = 146.00; // Approx baseline cost for D4s_v5 Pay-As-You-Go

        // Descriptions
        const descriptions = {
            'breadth': 'Distributes new user sessions evenly across all available session hosts. Best for maximizing user performance.',
            'depth': 'Saturates a single session host up to the maximum limit before routing to the next host. Best for cost optimization by allowing unused hosts to be deallocated.'
        };

        // Event Listeners
        els.algo.addEventListener('change', updateSimulation);
        els.users.addEventListener('input', updateSimulation);
        els.max.addEventListener('input', updateSimulation);
        els.hosts.addEventListener('input', updateSimulation);

        // Core Application Logic
        function updateSimulation() {
            const algo = els.algo.value;
            const users = parseInt(els.users.value);
            const max = parseInt(els.max.value);
            const totalHosts = parseInt(els.hosts.value);
            
            // Array representing user count on each VM
            let vms = Array(totalHosts).fill(0);

            // Update Text Variables
            els.usersVal.textContent = users;
            els.maxVal.textContent = max;
            els.hostsVal.textContent = totalHosts;
            els.algoDesc.textContent = descriptions[algo];
            els.benefitText.textContent = algo === 'breadth' ? 'Maximized Performance' : 'Cost Optimization';

            // Distribution Logic
            if (algo === 'breadth') {
                for (let i = 0; i < users; i++) {
                    vms[i % totalHosts]++;
                }
            } else {
                // Depth-first logic
                let remaining = users;
                for (let i = 0; i < totalHosts; i++) {
                    let toAdd = Math.min(remaining, max);
                    vms[i] = toAdd;
                    remaining -= toAdd;
                }
                // If users exceed ideal capacity (all hosts hit max), overflow evenly
                let overflowIdx = 0;
                while (remaining > 0) {
                    vms[overflowIdx % totalHosts]++;
                    remaining--;
                    overflowIdx++;
                }
            }

            // Execute UI Rendering Updates
            renderVMs(vms, max);
            updateCosts(vms, totalHosts);
        }

        // Cost Calculation Engine
        function updateCosts(vms, totalHosts) {
            const activeVMs = vms.filter(v => v > 0).length;
            const deallocatedVMs = totalHosts - activeVMs;
            
            const totalCost = activeVMs * COST_PER_VM_MONTH;
            const totalSavings = deallocatedVMs * COST_PER_VM_MONTH;

            els.costVal.textContent = `$${totalCost.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
            els.savingsVal.textContent = `$${totalSavings.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
        }

        // UI Rendering Engine
        function renderVMs(vms, max) {
            els.vmGrid.innerHTML = '';
            let activeCount = 0;

            vms.forEach((userCount, index) => {
                const isActive = userCount > 0;
                if (isActive) activeCount++;
                
                const isFull = userCount >= max;
                const overLimit = userCount > max;

                // Card Theming based on state
                const cardBg = isActive 
                    ? (overLimit ? 'bg-rose-50 border-rose-300' : 'bg-slate-50 border-indigo-200 shadow-md') 
                    : 'bg-slate-50 border-dashed border-slate-300 opacity-60';
                
                const headerColor = isActive 
                    ? (overLimit ? 'text-rose-700' : 'text-indigo-700') 
                    : 'text-slate-500';
                
                // Status Badge Creation
                const statusBadge = isActive 
                    ? `<span class="px-2 py-0.5 rounded-full text-[9px] font-bold ${isFull ? (overLimit ? 'bg-rose-200 text-rose-800' : 'bg-amber-100 text-amber-800') : 'bg-emerald-100 text-emerald-800'} uppercase tracking-wider">${isFull ? (overLimit ? 'Overloaded' : 'Full Capacity') : 'Running'}</span>`
                    : `<span class="px-2 py-0.5 rounded-full text-[9px] font-bold bg-slate-200 text-slate-500 uppercase tracking-wider">Deallocated</span>`;

                // Build User Avatars
                let usersHtml = '';
                for (let i = 0; i < userCount; i++) {
                    usersHtml += `
                        <div class="w-7 h-7 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-xs ring-2 ring-white shadow-sm" title="User ${i+1}">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                    `;
                }

                // Build Empty Placeholder Slots
                const emptySlots = Math.max(0, max - userCount);
                for (let i = 0; i < emptySlots; i++) {
                    usersHtml += `
                        <div class="w-7 h-7 rounded-full bg-slate-100 text-slate-300 flex items-center justify-center border border-slate-200 border-dashed">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                    `;
                }

                // Construct full VM Card HTML
                const vmCard = `
                    <div class="rounded-xl border p-4 flex flex-col transition-all duration-300 ${cardBg}">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <div class="text-sm font-bold ${headerColor}">Session Host ${index + 1}</div>
                                <div class="text-[10px] text-slate-500 mt-0.5 font-medium uppercase tracking-wide">Max Limit: ${max}</div>
                            </div>
                            ${statusBadge}
                        </div>
                        
                        <div class="flex-1">
                            <div class="text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-wider flex items-center justify-between">
                                Active Sessions
                                <span class="bg-white px-1.5 py-0.5 rounded border border-slate-200 text-slate-700">${userCount}</span>
                            </div>
                            <div class="flex flex-wrap gap-1.5">
                                ${usersHtml}
                            </div>
                        </div>
                        
                        ${overLimit ? `<div class="mt-4 p-2 bg-rose-100 border border-rose-200 text-rose-800 text-[10px] rounded-lg font-bold flex gap-1.5 items-start"><svg class="w-3.5 h-3.5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> Host capacity exceeded.</div>` : ''}
                    </div>
                `;
                els.vmGrid.insertAdjacentHTML('beforeend', vmCard);
            });

            els.activeCount.textContent = activeCount;
        }

        // Initialize simulation on first load
        updateSimulation();
    </script>
</body>
</html>
